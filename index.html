<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Cadastro</title>
</head>
<body>
    <div class="topo">
        <div class="image">
            <img src="imagens/prancheta.png">
        </div>
        <div class="cadastro-topo">
            <h1>Ficha de Cadastro de Funcionário</h1>
            <p>Formulário para coleta de dados pessoais, </p>
        </div>
    </div>

    <div class="documentos-necessarios">
        <div class="imagem-documentos">
            <img src="imagens/local-na-rede-internet.png">
        </div>
        <div class="dados-left">
            <ul>
                <li>Documento de Identidade (RG)</li>
                <li>CPF</li>
                <li>Carteira de Trabalho (física ou digital)</li>
                <li>Comprovante de Residência</li>
            </ul>
        </div>
        <div class="dados-right">
            <ul>
                <li>Título de eleitor</li>
            </ul>
        </div>
    </div>


    <div class="dados-pessoais">
        <div class="informacao-funcionario">
            <h2>1.Dados pessoais</h2>
            <p>Informações básicas do Funcionário</p>
        </div>

        <div class="linha">
            <div class="grande">
                <label>Nome Completo</label>
                <input type="text">
            </div>
            <div class="medio">
                <label>Nome Social</label>
                <input type="text">
            </div>
            <div class="medio">
                <label>Sexo</label>
                <input type="text">
            </div>
        </div>
        <div class="linha">
            <div class="pequeno">
                <label>Nacionalidade</label>
                <input type="text">
            </div>
            <div class="pequeno">
                <label>Data de nascimento</label>
                <input type="text">
            </div>
           
            <div class="pequeno">
                <label>Local de nascimento</label>
                <input type="text">
            </div>
           <div class="pequeno">
                <label>UF</label>
                <input type="text">
            </div>
        </div>

        
        <div class="linha">
            <div class="pequeno">
                <label>Endereço</label>
                <input type="text">
        </div>
        </div>
        
        <div class="linha">
            <div class="pequeno">
                <label>Bairro</label>
                <input type="text">
            </div>

            <div class="pequeno">
                <label>Cidade</label>
                <input type="text">
            </div>

            <div class="pequeno">
                <label>CEP</label>
                <input type="text">
            </div>

            <div class="pequeno">
                <label>Telefone</label>
                <input type="text">
            </div>
    </div>
</body>
</html>
